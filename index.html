<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Card Battle Arena — Online</title>
<!-- Firebase SDKs -->
<!-- Firebase loaded at bottom of body -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Sarabun:wght@300;400;500;600&display=swap');
:root{
  --bg:#0a0a12;--bg2:#11111e;--bg3:#191928;--panel:#1a1a2e;--border:#2a2a4a;
  --gold:#c8a850;--gold2:#e8c870;--red:#e05050;--green:#50c878;--blue:#5090e0;
  --purple:#9060d0;--white:#d0c8f0;--dim:#7070a0;--hp:#e04040;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--white);font-family:'Sarabun',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}
h1,h2{font-family:'Cinzel',serif;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── TITLE / SETUP ── */
#title-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;gap:10px;z-index:300;overflow-y:auto;}
#title-screen h1{font-size:28px;color:var(--gold);letter-spacing:4px;text-shadow:0 0 24px rgba(200,168,80,.5);}
.ts-sub{color:var(--dim);font-size:12px;text-align:center;}
.ts-pick{color:var(--gold2);font-size:13px;font-family:'Cinzel',serif;}

/* mode select */
.mode-row{display:flex;gap:12px;margin:4px 0;}
.mode-btn{padding:8px 20px;border-radius:6px;border:2px solid var(--border);background:var(--bg2);color:var(--dim);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:12px;transition:.2s;}
.mode-btn:hover{border-color:var(--gold);color:var(--gold);}
.mode-btn.active{border-color:var(--gold2);color:var(--gold2);background:rgba(200,168,80,.08);}

/* char grid */
#char-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:920px;width:100%;transition:.2s;}
.char-card{background:linear-gradient(160deg,#1a1a2e,#0d0d1a);border:2px solid var(--border);border-radius:12px;cursor:pointer;transition:.2s;text-align:center;position:relative;overflow:hidden;padding:0;}
.char-card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.9) 100%);z-index:1;pointer-events:none;}
.char-card:hover{border-color:var(--gold);transform:translateY(-5px);box-shadow:0 8px 24px rgba(200,168,80,.3);}
.char-card.selected{border-color:var(--gold2);box-shadow:0 0 22px rgba(200,168,80,.55);}
.char-card.selected::after{content:'✓';position:absolute;top:6px;right:6px;background:var(--gold);color:#000;border-radius:50%;width:20px;height:20px;line-height:20px;font-size:12px;font-weight:bold;z-index:3;}
.char-card.taken{opacity:.35;pointer-events:none;}
.char-card .cav{width:100%;height:165px;display:flex;align-items:flex-start;justify-content:center;font-size:40px;overflow:hidden;background:var(--bg3);}
.char-card .cav img{width:100%;height:100%;object-fit:cover;object-position:top center;image-rendering:auto;}
.char-card .cav svg{width:80px;height:80px;margin-top:20px;}
.char-card .cinfo{position:relative;z-index:2;padding:6px 6px 4px;margin-top:-30px;}
.char-card .char-emoji{position:absolute;top:8px;left:8px;font-size:14px;z-index:3;background:rgba(0,0,0,.6);border-radius:6px;padding:2px 5px;backdrop-filter:blur(2px);}
.char-card .cname{font-family:'Cinzel',serif;font-size:11px;color:var(--gold2);margin-bottom:2px;font-weight:600;}
.char-card .cpass{font-size:8px;color:var(--dim);line-height:1.4;min-height:18px;}
.char-card .cskill{font-size:8px;color:#70b0ff;margin-top:2px;line-height:1.3;}
.char-card .taken-by{position:absolute;top:4px;right:4px;font-size:8px;background:rgba(0,0,0,.7);border-radius:3px;padding:1px 4px;color:var(--gold);z-index:3;}


.btn-start{padding:10px 36px;border-radius:6px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;font-family:'Cinzel',serif;font-size:14px;letter-spacing:1px;transition:.2s;margin-top:4px;}
.btn-start:hover:not(:disabled){background:rgba(200,168,80,.1);}
.btn-start:disabled{opacity:.3;cursor:default;}

/* ── ONLINE LOBBY ── */
#online-lobby{display:none;position:fixed;inset:0;background:var(--bg);z-index:500;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;}
#online-lobby.show{display:flex;}
#online-lobby h2{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);}
.lobby-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:16px 20px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:10px;}
.lobby-input{padding:8px 10px;border-radius:5px;border:1px solid var(--border);
  background:var(--bg3);color:var(--white);font-family:'Sarabun',sans-serif;font-size:13px;width:100%;}
.lobby-input:focus{outline:none;border-color:var(--gold);}
.lobby-row{display:flex;gap:8px;}
.lobby-btn{flex:1;padding:9px;border-radius:5px;border:1px solid var(--gold);
  background:transparent;color:var(--gold);cursor:pointer;font-family:'Cinzel',serif;font-size:13px;transition:.2s;}
.lobby-btn:hover{background:rgba(200,168,80,.12);}
.lobby-btn.sec{border-color:var(--border);color:var(--dim);}
.lobby-btn.sec:hover{border-color:var(--gold);color:var(--gold);}
#lobby-status{font-size:12px;color:var(--dim);text-align:center;min-height:16px;}
#lobby-players{display:flex;flex-direction:column;gap:5px;}
.lobby-p-row{background:var(--bg3);border-radius:5px;padding:6px 10px;font-size:12px;
  display:flex;align-items:center;gap:8px;}
.lobby-p-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
.lobby-p-dot.empty{background:var(--border);}
#lobby-room-id{font-size:11px;color:var(--gold2);text-align:center;letter-spacing:1px;}
#lobby-copy{padding:4px 12px;border-radius:4px;border:1px solid var(--border);
  background:var(--panel);color:var(--dim);cursor:pointer;font-size:11px;}
#lobby-copy:hover{border-color:var(--gold);color:var(--gold);}
.online-mode-notice{font-size:10px;color:var(--dim);text-align:center;}

/* ── MAIN APP ── */
#app{display:flex;flex-direction:column;height:100vh;}
#header{background:var(--bg2);border-bottom:1px solid var(--border);padding:5px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
#header h1{font-size:15px;color:var(--gold);letter-spacing:2px;}
#phase-tag{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:10px;color:var(--dim);}
#turn-info{margin-left:auto;font-size:12px;color:var(--gold2);}
#deck-count{font-size:11px;color:var(--dim);}
#main{display:flex;flex:1;overflow:hidden;}
#board{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:8px 8px 110px;gap:6px;overflow-y:auto;}
.player-row{display:flex;align-items:stretch;gap:6px;width:100%;max-width:960px;}
.player-seat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 9px;flex:1;min-width:0;transition:border-color .2s,box-shadow .2s;}
.player-seat.active-turn{border-color:var(--gold);box-shadow:0 0 8px rgba(200,168,80,.3);}
.player-seat.dead{opacity:.32;pointer-events:none;}
.player-seat.my-seat{flex:0 0 320px;background:linear-gradient(135deg,#0e0e1e,#11112a);}
.seat-top{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.seat-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:1px solid var(--border);flex-shrink:0;overflow:hidden;}
.seat-av svg{width:24px;height:24px;}
.seat-name{font-weight:600;font-size:11px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.role-badge{font-size:8px;padding:1px 4px;border-radius:3px;flex-shrink:0;}
.role-LEADER{background:#8060a0;color:#e0d0ff;}.role-Guardian{background:#205080;color:#a0d0ff;}
.role-Betrayer{background:#602020;color:#ffa0a0;}.role-Watcher{background:#304020;color:#b0e090;}
.role-hidden{background:var(--panel);color:var(--dim);}
.bot-badge{font-size:7px;padding:1px 3px;border-radius:2px;background:#2a1a3a;color:#a080c0;flex-shrink:0;}
.human-badge{font-size:7px;padding:1px 3px;border-radius:2px;background:#0a2a1a;color:#50c878;flex-shrink:0;}
.hp-bar-wrap{height:4px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:3px 0;}
.hp-bar{height:100%;background:var(--hp);border-radius:3px;transition:width .4s;}
.stats-g{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin:3px 0;}
.s-box{background:var(--bg3);border-radius:3px;padding:2px;text-align:center;}
.s-box .sl{font-size:7px;color:var(--dim);}.s-box .sv{font-size:10px;font-weight:600;}
.mp-row{display:flex;align-items:center;gap:2px;margin:2px 0;}
.mp-dot{width:7px;height:7px;border-radius:50%;border:1px solid #444;}
.mp-dot.wf{background:#e8e8f8;}.mp-dot.bf{background:#8080c0;}.mp-dot.em{background:#1a1a2e;}
.mp-sep{font-size:8px;color:var(--dim);margin:0 2px;}
.equip-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
.equip-badge{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:9px;cursor:pointer;transition:.15s;}
.equip-badge:hover{border-color:var(--gold);color:var(--gold);}
.tag-sm{font-size:8px;margin-top:2px;}.curse-tag{color:#e080a0;}.card-ct{color:var(--dim);}

/* my status */
.my-status{margin-top:6px;border-top:1px solid var(--border);padding-top:5px;}
.my-status-title{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.my-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.my-stat-box{background:var(--bg3);border-radius:5px;padding:4px 3px;text-align:center;}
.my-stat-box .msl{font-size:8px;color:var(--dim);}.my-stat-box .msv{font-size:13px;font-weight:700;}
.msv-hp{color:#e04040;}.msv-atk{color:#e08050;}.msv-def{color:#5080e0;}
.msv-range{color:#50c878;}.msv-ap{color:var(--gold);}.msv-mp{color:#a070e0;}.msv-hand{color:var(--white);}
.my-char-info{margin-top:4px;font-size:9px;line-height:1.5;}
.my-passive{color:var(--blue);}.my-skill-desc{color:var(--purple);}

/* center */
#deck-pile{width:52px;height:76px;background:var(--panel);border:2px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;}
#deck-pile span{font-size:18px;}#deck-pile small{font-size:9px;color:var(--dim);}
#disc-pile{width:52px;height:76px;background:var(--bg3);border:1px dashed var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;}
#disc-pile small{font-size:9px;color:var(--dim);}
#center-lbl{flex:1;text-align:center;font-size:11px;color:var(--dim);}

/* action panel */
#action-panel{width:168px;background:var(--bg2);border-left:1px solid var(--border);padding:8px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex-shrink:0;}
#action-panel h2{font-size:12px;color:var(--gold);border-bottom:1px solid var(--border);padding-bottom:4px;}
.ap-pips{display:flex;align-items:center;gap:3px;margin-bottom:2px;}
.ap-pip{width:9px;height:9px;border-radius:50%;background:var(--gold);}.ap-pip.used{background:var(--bg3);border:1px solid var(--border);}
.btn{width:100%;padding:5px 7px;border-radius:4px;border:1px solid var(--border);background:var(--panel);color:var(--white);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:11px;transition:.15s;text-align:left;}
.btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}.btn:disabled{opacity:.35;cursor:default;}
.btn.primary{border-color:var(--gold);color:var(--gold);}.btn.danger{border-color:var(--red);color:var(--red);}.btn.green{border-color:var(--green);color:var(--green);}
.log-wrap{flex:1;overflow-y:auto;}
#log{font-size:10px;color:var(--dim);display:flex;flex-direction:column;gap:1px;}
.log-e{padding:2px 0;border-bottom:1px solid var(--bg3);}
.log-e.imp{color:var(--gold);}.log-e.dmg{color:var(--red);}.log-e.hl{color:var(--green);}

/* hand */
#hand-wrap{position:fixed;bottom:0;left:0;right:168px;background:var(--bg2);border-top:1px solid var(--border);padding:6px 10px;z-index:50;}
#hand-lbl{font-size:10px;color:var(--dim);margin-bottom:4px;}
#hand{display:flex;gap:5px;flex-wrap:wrap;min-height:86px;}

/* card */
.card{width:58px;height:84px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:4px;transition:transform .15s,border-color .15s,box-shadow .15s;position:relative;user-select:none;}
.card:hover{transform:translateY(-4px);border-color:var(--gold);}
.card.sel{border-color:var(--gold2);transform:translateY(-8px);box-shadow:0 4px 12px rgba(200,168,80,.4);}
.card .sym{font-size:17px;}.sym-hammer{color:#e08030;}.sym-scissors{color:#5080e0;}.sym-paper{color:#50c060;}
.card .cname{font-size:7px;text-align:center;color:var(--dim);line-height:1.2;}
.card .cnum{font-size:10px;font-weight:600;color:var(--gold);}
.card .ctype{font-size:6px;padding:1px 3px;border-radius:2px;}
.type-action{background:#203050;color:#80b0e0;}.type-curse{background:#400020;color:#e080a0;}.type-equipment{background:#302000;color:#e0b050;}
.card .apc{position:absolute;top:2px;right:2px;font-size:7px;font-weight:700;color:var(--gold);background:rgba(0,0,0,.7);border-radius:2px;padding:0 2px;}

/* modal */
#modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:center;justify-content:center;}
#modal-wrap.show{display:flex;}
#modal{background:var(--bg2);border:1px solid var(--gold);border-radius:8px;padding:16px;max-width:500px;width:92%;max-height:82vh;overflow-y:auto;}
#modal h2{font-size:14px;color:var(--gold);margin-bottom:8px;}
#modal-body{margin-bottom:10px;font-size:12px;line-height:1.6;}
#modal-acts{display:flex;gap:6px;flex-wrap:wrap;}
#modal-acts .btn{flex:1;min-width:100px;}

/* ★ CARD PLAYED BANNER — ตรงกลางหน้าจอ ★ */
#card-play-overlay{
  display:none;position:fixed;inset:0;z-index:85;
  align-items:center;justify-content:center;pointer-events:none;
}
#card-play-overlay.show{display:flex;}
.cpo-inner{
  background:rgba(10,8,20,.92);border:2px solid var(--gold);border-radius:12px;
  padding:16px 28px;text-align:center;
  animation:cpo-in .2s ease;
}
@keyframes cpo-in{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.cpo-player{font-size:11px;color:var(--dim);margin-bottom:4px;}
.cpo-card-sym{font-size:40px;margin:4px 0;}
.cpo-card-name{font-size:16px;font-weight:700;color:var(--gold);}
.cpo-card-type{font-size:10px;color:var(--dim);margin-top:2px;}

/* ★ DEATH REVEAL OVERLAY ★ */
#death-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;
  align-items:center;justify-content:center;
}
#death-overlay.show{display:flex;}
.death-inner{
  background:var(--bg2);border:2px solid var(--red);border-radius:12px;
  padding:24px 36px;text-align:center;max-width:360px;
}
.death-title{font-size:18px;color:var(--red);font-family:'Cinzel',serif;margin-bottom:12px;}
.death-player{font-size:14px;color:var(--white);margin-bottom:8px;}
.death-role{font-size:22px;font-weight:700;margin:10px 0;}
.death-role.role-LEADER{color:#c090e0;}
.death-role.role-Guardian{color:#70b0f0;}
.death-role.role-Betrayer{color:#f08080;}
.death-role.role-Watcher{color:#90d070;}
.death-cont{margin-top:14px;padding:7px 20px;border-radius:5px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:12px;}

/* attack banner */
#banner-atk{display:none;position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);background:rgba(10,8,20,.95);border:2px solid var(--red);border-radius:8px;padding:12px 24px;z-index:90;font-size:15px;text-align:center;pointer-events:none;}
#banner-atk.show{display:block;}
#tooltip{display:none;position:fixed;background:var(--panel);border:1px solid var(--gold);border-radius:5px;padding:8px 10px;font-size:11px;z-index:200;max-width:240px;pointer-events:none;line-height:1.6;white-space:pre-line;}

/* win screen */
#win-screen{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:400;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#win-screen.show{display:flex;}
#win-screen h1{font-size:26px;color:var(--gold);}
#win-screen p{color:var(--white);font-size:14px;text-align:center;max-width:440px;}
.btn-reload{padding:10px 32px;border-radius:6px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;font-family:'Cinzel',serif;font-size:13px;transition:.2s;}
.btn-reload:hover{background:rgba(200,168,80,.1);}


/* ══════════════════════════
   MOBILE / TOUCH RESPONSIVE
══════════════════════════ */
@media (max-width: 600px) {
  /* header compact */
  #header h1{font-size:12px;letter-spacing:1px;}
  #phase-tag{font-size:9px;padding:2px 5px;}
  #turn-info{font-size:10px;}
  #deck-count{display:none;}

  /* board fills screen, action panel hidden - use bottom sheet instead */
  #main{flex-direction:column;}
  #action-panel{
    width:100%;height:auto;max-height:none;
    border-left:none;border-top:1px solid var(--border);
    flex-direction:row;flex-wrap:wrap;gap:4px;padding:6px 8px;
    flex-shrink:0;overflow-y:visible;
  }
  #action-panel h2{display:none;}
  #action-panel .ap-pips{order:-1;width:100%;margin-bottom:2px;}
  .log-wrap{display:none;}
  .btn{padding:7px 4px;font-size:10px;min-width:0;}
  #btn-atk{order:1;flex:1 1 30%;}
  #btn-draw{order:2;flex:1 1 30%;}
  #btn-play{order:3;flex:1 1 30%;}
  #btn-inst{order:4;flex:1 1 22%;}
  #btn-cskill{order:5;flex:1 1 22%;}
  #btn-iskill{order:6;flex:1 1 22%;}
  #btn-end{order:7;flex:1 1 22%;}

  /* board */
  #board{padding:4px 4px 130px;gap:4px;}
  .player-row{gap:4px;}
  .player-seat{padding:5px 6px;}
  .my-seat{flex:0 0 100%!important;}

  /* seats — top 4 smaller */
  .seat-av{width:20px;height:20px;font-size:10px;}
  .seat-name{font-size:9px;}
  .role-badge{font-size:7px;}
  .bot-badge,.human-badge{font-size:6px;}
  .s-box .sl{font-size:6px;}.s-box .sv{font-size:9px;}
  .mp-dot{width:6px;height:6px;}
  .equip-badge{font-size:8px;padding:1px 3px;}
  .tag-sm{font-size:7px;}

  /* my status grid larger text on mobile */
  .my-stat-box .msv{font-size:15px;}
  .my-stat-box .msl{font-size:8px;}
  .my-char-info{font-size:10px;}

  /* center row compact */
  #deck-pile, #disc-pile{width:42px;height:60px;}
  #deck-pile span{font-size:14px;}
  #center-lbl{font-size:10px;}

  /* hand area — bigger cards for touch */
  #hand-wrap{right:0;padding:5px 8px;}
  #hand-lbl{font-size:10px;}
  .card{width:64px;height:92px;}
  .card .sym{font-size:20px;}
  .card .cname{font-size:8px;}
  .card .cnum{font-size:12px;}
  .card .apc{font-size:8px;}

  /* modal full-width */
  #modal{width:96%;max-height:90vh;padding:14px;}
  #modal h2{font-size:13px;}
  #modal-body{font-size:12px;}
  #modal-acts .btn{padding:10px 6px;font-size:12px;}

  /* overlays */
  .cpo-inner{padding:12px 20px;}
  .cpo-card-sym{font-size:36px;}
  .cpo-card-name{font-size:15px;}
  #banner-atk{font-size:13px;padding:10px 16px;}

  /* title screen */
  #title-screen h1{font-size:22px;}
  #char-grid{grid-template-columns:repeat(2,1fr)!important;}
  .char-card .cav{width:44px;height:44px;}
  .char-card .cname{font-size:10px;}

  .mode-row{flex-direction:column;width:100%;max-width:300px;}

@media (max-width: 380px) {

/* Touch-friendly: larger tap targets */

<body>

<!-- TITLE / SETUP -->

</div>

<script>
const CHAR_IMAGES = {};

/* ═══ CONSTANTS ═══ */
const ROLES=['LEADER','Guardian','Betrayer','Betrayer','Watcher'];
const SYM=['hammer','scissors','paper'];
const SYM_EMOJI={hammer:'🔨',scissors:'✂️',paper:'📄'};
const DODGE_SYM={hammer:'paper',scissors:'hammer',paper:'scissors'};
const ROLE_COLOR={LEADER:'#c090e0',Guardian:'#70b0f0',Betrayer:'#f08080',Watcher:'#90d070'};

/* ═══ CHARACTERS ═══ */
const CHARACTERS=[
  {id:'zizeus',name:'Zizeus',emoji:'⚡',color:'#d4a020',passive:'—',skillDesc:'จ่าย 3 MP → เลือก 1 คน HP-2',hasSkill:true,
   onSkill(pi){const p=G.players[pi];if(!spendMP(p,3)){addLog('MP ไม่พอ (3)');return;}
     pickTarget(pi,'Zizeus: เลือกเป้าหมาย',t=>{t.hp=Math.max(0,t.hp-2);addLog(`⚡ Zizeus! ${t.name} HP-2`,'dmg');checkDeath(t.i);renderAll();})}},
  {id:'pluto',name:'Pluto',emoji:'💀',color:'#9060d0',passive:'—',skillDesc:'จ่าย 2 MP → ทุกคนทิ้งการ์ด 1 ใบ',hasSkill:true,
   onSkill(pi){const p=G.players[pi];if(!spendMP(p,2)){addLog('MP ไม่พอ (2)');return;}
     for(const q of G.players){if(q.dead||q.i===pi||q.isBot&&q.hand.length){if(q.isBot&&!q.dead&&q.i!==pi){const c=q.hand.splice(~~(Math.random()*q.hand.length),1)[0];G.discard.push(c);addLog(`${q.name}: ทิ้ง ${c.name}`);}}}
     // human players must pick — queue them
     G._plutoVictims=G.players.filter(q=>!q.dead&&q.i!==pi&&!q.isBot&&q.hand.length).map(q=>q.i);
     plutoNextVictim();}},
  {id:'hades',name:'Hades',emoji:'🌑',color:'#5050a0',passive:'—',skillDesc:'เสีย 1 HP → จั่ว 2 ใบ',hasSkill:true,
   onSkill(pi){const p=G.players[pi];if(p.hp<=1){addLog('HP ไม่พอ');return;}p.hp--;drawCards(pi,2);addLog(`🌑 Hades: HP-1 → จั่ว 2 ใบ`,'dmg');renderAll();}},
  {id:'arez',name:'Arez',emoji:'⚔️',color:'#e05050',passive:'Multi-Atk: โจมตีได้ไม่จำกัดครั้ง',skillDesc:'(Passive) Multi-Atk',hasSkill:false,
   onSetup(p){p.multiAtk=true;}},
  {id:'hermes',name:'Hermes',emoji:'🪶',color:'#40d090',passive:'—',skillDesc:'จ่าย 1 MP → ทำลายอุปกรณ์เป้าหมาย',hasSkill:true,
   onSkill(pi){const p=G.players[pi];if(!spendMP(p,1)){addLog('MP ไม่พอ');return;}
     const ts=G.players.filter(q=>!q.dead&&q.i!==pi&&Object.keys(q.equip).length>0);
     if(!ts.length){addLog('ไม่มีเป้าหมายที่มีอุปกรณ์');return;}
     showModal('Hermes: เลือกเป้าหมาย',ts.map(t=>`<button class="btn" onclick="hermesDestroy(${t.i})">${t.char.emoji} ${t.name}</button>`).join(''),[{label:'ยกเลิก',fn:closeModal}]);}},
  {id:'aphrodite',name:'Aphrodite',emoji:'💕',color:'#e050a0',passive:'—',skillDesc:'จ่าย 2 MP → เลือก 2 คนท้าดวล',hasSkill:true,
   onSkill(pi){const p=G.players[pi];if(!spendMP(p,2)){addLog('MP ไม่พอ');return;}
     const ts=G.players.filter(q=>!q.dead&&q.i!==pi);if(ts.length<2){addLog('ผู้เล่นไม่พอ');return;}
     G._aphSel=[];
     showModal('Aphrodite Skill','<div style="margin-bottom:6px;font-size:11px;color:var(--dim);">เลือก 2 คน</div>'+ts.map(t=>`<button class="btn" id="aph${t.i}" onclick="aphToggle(${t.i})">${t.char.emoji} ${t.name}</button>`).join(''),[{label:'ยืนยัน',fn:aphConfirm},{label:'ยกเลิก',fn:closeModal}]);}},
  {id:'hephaestus',name:'Hephaestus',emoji:'🔥',color:'#e07030',passive:'ติดตั้งอุปกรณ์ → จั่ว +1',skillDesc:'(Passive) Equip→Draw 1',hasSkill:false,
   onEquip(pi){drawCards(pi,1);}},
  {id:'athena',name:'Athena',emoji:'🦉',color:'#6090e0',passive:'ติดตั้งอุปกรณ์ → ATK+1 ชั่วคราว',skillDesc:'(Passive) Equip→ATK+1 till End',hasSkill:false,
   onEquip(pi){G.players[pi]._athBonus=(G.players[pi]._athBonus||0)+1;recalcStats(pi);}},
  {id:'artemis',name:'Artemis',emoji:'🏹',color:'#50c050',passive:'ระยะโจมตีเริ่มต้น +3',skillDesc:'(Passive) ระยะ +3',hasSkill:false,onSetup(p){p.range+=3;}},
  {id:'apollonius',name:'Apollonius',emoji:'☀️',color:'#f0d040',passive:'Draw Phase: จั่ว 3 ใบแทน 2',skillDesc:'(Passive) จั่ว 3/เทิร์น',hasSkill:false,extraDraw:1}
];

/* ═══ DECK ═══ */
function makeDeck(){
  const cards=[];let id=0;
  function add(n,def){for(let i=0;i<n;i++)cards.push({id:id++,sym:SYM[~~(Math.random()*3)],num:~~(Math.random()*7)+1,...def});}
  add(4,{name:'การ์ดทำลาย',type:'action',ap:1,effect:'destroy'});
  add(4,{name:'การ์ดขโมย',type:'action',ap:1,effect:'steal'});
  add(4,{name:'การ์ดข้ามเทิร์น',type:'curse',ap:1,effect:'skipturn'});
  add(6,{name:'จั่วสองใบ',type:'action',ap:0,effect:'draw2'});
  add(3,{name:'การ์ดยา',type:'action',ap:0,effect:'heal1'});
  add(3,{name:'ฮีลแรง',type:'action',ap:0,effect:'healstrong'});
  add(4,{name:'การ์ดยกเลิก',type:'action',ap:0,effect:'cancel'});
  add(2,{name:'ตีวงกว้าง🔨',type:'action',ap:1,effect:'aoe_hammer'});
  add(2,{name:'ตีวงกว้าง✂️',type:'action',ap:1,effect:'aoe_scissors'});
  add(2,{name:'ตีวงกว้าง📄',type:'action',ap:1,effect:'aoe_paper'});
  add(4,{name:'การ์ดแบ่งปัน',type:'action',ap:0,effect:'share'});
  add(6,{name:'การ์ดท้าดวล',type:'action',ap:1,effect:'duel'});
  add(2,{name:'การ์ดคำสาป',type:'curse',ap:1,effect:'curse'});
  add(4,{name:'สวนกลับ',type:'action',ap:0,effect:'counter'});
  add(2,{name:'ดาบ',type:'equipment',ap:0,slot:'weapon',effect:'equip',stats:{atk:3},desc:'ATK+3'});
  add(2,{name:'ธนู',type:'equipment',ap:0,slot:'weapon',effect:'equip',stats:{atk:1,range:2,multiAtk:true},desc:'ATK+1 ระยะ+2 Multi-Atk'});
  add(2,{name:'หอก',type:'equipment',ap:0,slot:'weapon',effect:'equip',stats:{atk:1,range:1,ignoreArmor:true},desc:'ATK+1 ระยะ+1 ทะลุเกราะ'});
  add(2,{name:'ทวน',type:'equipment',ap:0,slot:'weapon',effect:'equip',stats:{atk:2,multiAtk:true},desc:'ATK+2 Multi-Atk'});
  add(2,{name:'ไม้เบสบอล',type:'equipment',ap:0,slot:'weapon',effect:'equip',stats:{atk:1,drawAfterAtk:true},desc:'ATK+1 โจมตีแล้วจั่ว 1'});
  add(2,{name:'ผ้าคลุมฮีโร่',type:'equipment',ap:0,slot:'armor',effect:'equip',stats:{},armorType:'cape',desc:'เปิดการ์ด: กระดาษ→สะท้อน'});
  add(2,{name:'เสื้อหนา',type:'equipment',ap:0,slot:'armor',effect:'equip',stats:{},armorType:'jacket',desc:'เปิดการ์ด: กรรไกร→บล็อก'});
  add(2,{name:'โล่ไวเบเนียม',type:'equipment',ap:0,slot:'armor',effect:'equip',stats:{def:1},armorType:'shield',desc:'DEF+1'});
  add(2,{name:'สร้อยคอ',type:'equipment',ap:0,slot:'trinket',effect:'equip',skill:'necklace',desc:'Skill: -1HP→จั่ว 2'});
  add(2,{name:'กระเป๋า',type:'equipment',ap:0,slot:'trinket',effect:'equip',skill:'bag',desc:'Skill: -1MP→จั่ว 1'});
  add(2,{name:'เครื่องชาร์จไฟ',type:'equipment',ap:0,slot:'trinket',effect:'equip',skill:'charger',desc:'Standby: +1 MP ดำอัตโนมัติ'});
  add(2,{name:'นาฬิกา',type:'equipment',ap:0,slot:'trinket',effect:'equip',skill:'watch',desc:'Skill: -2MP→จั่ว 3'});
  add(2,{name:'หมาน้อย',type:'equipment',ap:0,slot:'pet',effect:'equip',skill:'dog',desc:'Skill: -3MP ดำ→เป้า HP-1'});
  add(2,{name:'แมวน้อย',type:'equipment',ap:0,slot:'pet',effect:'equip',skill:'cat',desc:'Skill: -2MP ขาว→เป้า HP+1'});
  add(6,{name:'BLACK',type:'action',ap:1,effect:'mp_black1'});
  add(6,{name:'WHITE',type:'action',ap:1,effect:'mp_white1'});
  add(4,{name:'SUPER BLACK',type:'action',ap:1,effect:'mp_black2'});
  add(4,{name:'SUPER WHITE',type:'action',ap:1,effect:'mp_white2'});
  add(6,{name:'MORE ACTION',type:'action',ap:0,effect:'ap_plus1'});
  return shuffle(cards);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ═══ SETUP STATE ═══ */
let G={};
let selectedCharId=null;

function buildCharGrid(){
  const grid=document.getElementById('char-grid');
  grid.innerHTML=CHARACTERS.map(ch=>{
    const hasImg=CHAR_IMAGES&&CHAR_IMAGES[ch.id];
    return`<div class="char-card" id="cc-${ch.id}" onclick="selectChar('${ch.id}')">
      <div class="char-emoji">${ch.emoji}</div>
      <div class="cav" style="background:${ch.color}22;">${charSVG(ch.id,hasImg?160:56)}</div>
      <div class="cinfo">
        <div class="cname">${ch.name}</div>
        <div class="cpass">${ch.passive!=='—'?ch.passive:'&nbsp;'}</div>
        <div class="cskill">${ch.skillDesc}</div>
      </div>
    </div>`;
  }).join('');
  if(selectedCharId)document.getElementById('cc-'+selectedCharId)?.classList.add('selected');
}

function selectChar(id){
  selectedCharId=id;
  document.querySelectorAll('.char-card').forEach(el=>el.classList.remove('selected'));
  document.getElementById('cc-'+id)?.classList.add('selected');
  document.getElementById('btn-start').disabled=false;
}

/* ═══ START GAME ═══ */
function startGame(){
  if(!selectedCharId)return;
  document.getElementById('title-screen').style.display='none';
  const roleList=shuffle([...ROLES]);
  const humanChar=CHARACTERS.find(c=>c.id===selectedCharId);
  const botChars=shuffle(CHARACTERS.filter(c=>c.id!==selectedCharId)).slice(0,4);
  const chars=[humanChar,...botChars];
  const names=['คุณ','Bot A','Bot B','Bot C','Bot D'];

  G={deck:makeDeck(),discard:[],players:[],turn:0,phase:'standby',ap:3,
     attackUsed:false,selectedCard:null,log:[],gameOver:false,
     skipCurse:Array(5).fill(false),curseCard:Array(5).fill(null),
     _aphSel:[],_deathQueue:[],_deathCb:null,_plutoVictims:[],
     humanCount:1};

  for(let i=0;i<5;i++){
    const role=roleList[i],ch=chars[i];
    const p={i,name:names[i],isBot:i>0,role,char:ch,
             hp:role==='LEADER'?8:7,maxHp:role==='LEADER'?8:7,
             atk:1,def:0,range:1,mpW:0,mpB:0,
             hand:[],equip:{},dead:false,
             multiAtk:false,ignoreArmor:false,drawAfterAtk:false,_athBonus:0};
    if(ch.onSetup)ch.onSetup(p);
    G.players.push(p);
  }
  for(let r=0;r<5;r++)for(let i=0;i<5;i++){const c=G.deck.pop();if(c)G.players[i].hand.push(c);}

  addLog('=== เกมเริ่ม! ===','imp');
  const ldr=G.players.find(p=>p.role==='LEADER');
  addLog(`👑 LEADER: ${ldr.name} [${ldr.char.name}]`,'imp');
  renderAll();setTimeout(()=>beginTurn(0),400);
}

/* ═══ TURN ENGINE ═══ */
function beginTurn(pi){
  if(G.gameOver)return;
  G.turn=pi;G.ap=3;G.attackUsed=false;G.selectedCard=null;
  const p=G.players[pi];
  if(p.dead){nextTurn();return;}
  if(p._athBonus){p._athBonus=0;recalcStats(pi);}
  setPhase('standby');
  addLog(`— เทิร์น ${p.char.emoji} ${p.name} —`);
  if(p.equip.trinket?.skill==='charger'){p.mpB=Math.min(3,p.mpB+1);addLog(`${p.name}: ชาร์จไฟ +1 MPดำ`);}
  if(G.curseCard[pi]){
    if(!G.deck.length)G.deck=shuffle(G.discard.splice(0));
    const top=G.deck.pop();G.discard.push(G.curseCard[pi]);
    if(top){
      G.discard.push(top);
      if(top.sym==='hammer'){p.hp=Math.max(0,p.hp-3);addLog(`${p.name}: คำสาปออก🔨 HP-3!`,'dmg');checkDeath(pi);}
      else{const nxt=nextAlive(pi);if(nxt!==null){G.curseCard[nxt]=G.curseCard[pi];addLog(`คำสาปส่งต่อ→${G.players[nxt].name}`);}}
      G.curseCard[pi]=null;
    }
    if(G.gameOver)return;
  }
  if(G.skipCurse[pi]){
    G.skipCurse[pi]=false;setPhase('draw');drawCards(pi,2+(p.char.extraDraw||0));
    addLog(`${p.name}: ถูกข้ามเทิร์น!`);setPhase('end');
    setTimeout(()=>endPhase(pi),p.isBot?600:800);return;
  }
  setPhase('draw');drawCards(pi,2+(p.char.extraDraw||0));
  setPhase('action');renderAll();

  if(p.isBot)setTimeout(()=>botTurn(pi),800);
}

function endPhase(pi){
  if(G.gameOver)return;
  const p=G.players[pi];setPhase('end');
  if(p.char.id==='athena'){p._athBonus=0;recalcStats(pi);}
  while(p.hand.length>7){const c=p.hand.splice(~~(Math.random()*p.hand.length),1)[0];G.discard.push(c);if(!p.isBot)addLog(`${p.name} ทิ้ง ${c.name} (เกิน7)`);}
  renderAll();
  setTimeout(()=>nextTurn(),p.isBot?550:400);
}

function nextTurn(){
  if(G.gameOver)return;
  let nxt=(G.turn+1)%5,t=0;
  while(G.players[nxt].dead&&t<5){nxt=(nxt+1)%5;t++;}
  if(t>=5){checkWin();return;}
  beginTurn(nxt);
}

/* ═══ HELPERS ═══ */
function setPhase(ph){
  G.phase=ph;
  document.getElementById('phase-tag').textContent={standby:'Standby',draw:'Draw Phase',action:'Action Phase',end:'End Phase'}[ph]||ph;
}
function drawCards(pi,n){
  const p=G.players[pi];
  for(let i=0;i<n;i++){
    if(!G.deck.length){G.deck=shuffle(G.discard.splice(0));addLog('สับกองทิ้งใหม่');}
    const c=G.deck.pop();if(c)p.hand.push(c);
  }
  renderAll();
}
function addLog(msg,cls=''){
  G.log.unshift({msg,cls});if(G.log.length>80)G.log.pop();
  const el=document.getElementById('log');
  if(el)el.innerHTML=G.log.slice(0,40).map(l=>`<div class="log-e ${l.cls}">${l.msg}</div>`).join('');
}
function getNeighbors(pi){
  const alive=G.players.filter(p=>!p.dead).map(p=>p.i);
  const idx=alive.indexOf(pi);if(idx===-1)return[];
  const range=G.players[pi].range;const res=new Set();
  for(let r=1;r<=range;r++){
    const L=alive[(idx-r+alive.length)%alive.length];
    const R=alive[(idx+r)%alive.length];
    if(L!==pi)res.add(L);if(R!==pi)res.add(R);
  }
  return[...res];
}
function nextAlive(pi){
  const nx=G.players.filter(p=>!p.dead&&p.i!==pi).sort((a,b)=>(a.i-pi+5)%5-(b.i-pi+5)%5);
  return nx.length?nx[0].i:null;
}
function isCurrentHuman(){return!G.players[G.turn].isBot;}
function isMyTurnToAct(){
  if(G.gameOver)return false;
  if(OL.roomId){
    // Online: only act when it's your player index's turn AND action phase
    const myIdx = OL.myPlayerIdx ?? 0;
    return G.turn === myIdx && G.phase==='action' && !G.players[G.turn]?.isBot;
  }
  return!G.players[G.turn].isBot&&G.phase==='action';
}

/* ★ DEATH REVEAL ★ */
function checkDeath(pi){
  const p=G.players[pi];
  if(p.hp<=0&&!p.dead){
    p.dead=true;p.hp=0;
    addLog(`💀 ${p.name} [${p.char.name}] ตาย!`,'dmg');
    // show death reveal then check win
    showDeathReveal(pi,()=>checkWin());
  }
}

function showDeathReveal(pi,cb){
  const p=G.players[pi];
  document.getElementById('dov-player').textContent=`${p.char.emoji} ${p.name} [${p.char.name}]`;
  const roleEl=document.getElementById('dov-role');
  roleEl.textContent=p.role;
  roleEl.className='death-role role-'+p.role;
  const noteEl=document.getElementById('dov-note');
  const roleNotes={LEADER:'ผู้นำ — ทุกคนต้องการกำจัดเขา',Guardian:'ผู้พิทักษ์ — ปกป้อง LEADER',Betrayer:'ผู้ทรยศ — ต้องการสังหาร LEADER',Watcher:'ผู้เฝ้าดู — รอเป็นคนสุดท้าย'};
  noteEl.textContent=roleNotes[p.role]||'';
  G._deathCb=cb;
  document.getElementById('death-overlay').classList.add('show');
}

function closeDeath(){
  document.getElementById('death-overlay').classList.remove('show');
  if(G._deathCb){const cb=G._deathCb;G._deathCb=null;cb();}
}

function checkWin(){
  const ldr=G.players.find(p=>p.role==='LEADER');
  const btrs=G.players.filter(p=>p.role==='Betrayer');
  const wtch=G.players.find(p=>p.role==='Watcher');
  const grd=G.players.find(p=>p.role==='Guardian');
  if(ldr.dead){
    const alive=G.players.filter(p=>!p.dead);
    if(!wtch.dead&&alive.length===1)endGame('⚫ Watcher',`${wtch.name} ชนะ! เหลืออยู่คนสุดท้าย`);
    else if(btrs.some(b=>!b.dead))endGame('🔴 Betrayer','Betrayer กำจัด LEADER สำเร็จ!');
    else endGame('?','LEADER ตาย');
    return;
  }
  if(btrs.every(b=>b.dead)&&wtch.dead)endGame('👑 LEADER & Guardian',`${ldr.name} และ ${grd?.name||''} ชนะ!`);
}

function endGame(winner,detail){
  G.gameOver=true;
  renderAll();
  document.getElementById('win-title').textContent=`🏆 ${winner} ชนะ!`;
  document.getElementById('win-detail').textContent=detail;
  // show all roles
  const rolesHtml=G.players.map(p=>`<div style="padding:3px 0;color:${ROLE_COLOR[p.role]||'#fff'};">${p.char.emoji} ${p.name}: <b>${p.role}</b> ${p.dead?'💀':''}</div>`).join('');
  document.getElementById('win-roles').innerHTML='<div style="margin-bottom:4px;color:var(--dim);">Role ทั้งหมด:</div>'+rolesHtml;
  document.getElementById('win-screen').classList.add('show');
  addLog(`🏆 ${detail}`,'imp');
}

function spendMP(p,n){
  if(p.mpW+p.mpB<n)return false;
  let need=n;
  if(p.mpB>=need)p.mpB-=need;
  else{need-=p.mpB;p.mpB=0;p.mpW=Math.max(0,p.mpW-need);}
  return true;
}
function recalcStats(pi){
  const p=G.players[pi],ch=p.char;
  p.atk=1;p.def=0;p.range=1;p.multiAtk=false;p.ignoreArmor=false;p.drawAfterAtk=false;
  if(ch.id==='arez')p.multiAtk=true;
  if(ch.id==='artemis')p.range+=3;
  for(const eq of Object.values(p.equip)){
    if(!eq.stats)continue;
    if(eq.stats.atk)p.atk+=eq.stats.atk;
    if(eq.stats.def)p.def+=eq.stats.def;
    if(eq.stats.range)p.range+=eq.stats.range;
    if(eq.stats.multiAtk)p.multiAtk=true;
    if(eq.stats.ignoreArmor)p.ignoreArmor=true;
    if(eq.stats.drawAfterAtk)p.drawAfterAtk=true;
  }
  if(p._athBonus)p.atk+=p._athBonus;
}
function pickTarget(pi,title,cb){
  const ts=G.players.filter(q=>!q.dead&&q.i!==pi);
  showModal(title,ts.map(t=>`<button class="btn" onclick="closeModal();_pcb(${t.i})">${t.char.emoji} ${t.name} HP:${t.hp}</button>`).join(''),[{label:'ยกเลิก',fn:closeModal}]);
  window._pcb=(ti)=>cb(G.players[ti]);
}

/* ★ CARD PLAY OVERLAY ★ */
function showCardOverlay(playerName,card,cb){
  const el=document.getElementById('cpo-inner');
  const typeLabel={action:'Action',curse:'Curse',equipment:'Equipment'}[card.type]||card.type;
  // find which player is playing
  const playingPlayer=G.players.find(p=>p.name===playerName)||null;
  const artHtml=playingPlayer?`<div style="width:48px;height:48px;margin:0 auto 4px;">${charSVG(playingPlayer.char.id,48)}</div>`:'';
  el.innerHTML=`
    ${artHtml}
    <div class="cpo-player">${playerName} เล่นการ์ด</div>
    <div class="cpo-card-sym sym-${card.sym}">${SYM_EMOJI[card.sym]}</div>
    <div class="cpo-card-name">${card.name}</div>
    <div class="cpo-card-type">${typeLabel}${card.ap>0?' · '+card.ap+' AP':''}</div>`;
  document.getElementById('card-play-overlay').classList.add('show');
  setTimeout(()=>{
    document.getElementById('card-play-overlay').classList.remove('show');
    if(cb)cb();
  },2000);
}

/* ═══ ATTACK SYSTEM ═══ */
function startAttack(){
  if(!isMyTurnToAct()||G.gameOver)return;
  const p=G.players[G.turn];
  if(G.ap<1){addLog('AP ไม่พอ');return;}
  if(G.attackUsed&&!p.multiAtk){addLog('โจมตีได้แค่ 1 ครั้ง (ยกเว้น Multi-Atk)');return;}
  if(!p.hand.length){addLog('ไม่มีการ์ดในมือ');return;}
  const nb=getNeighbors(G.turn);
  if(!nb.length){addLog('ไม่มีเป้าหมายในระยะ');return;}
  showModal('⚔ เลือกการ์ดโจมตี','<div style="font-size:11px;color:var(--dim);margin-bottom:6px;">สัญลักษณ์จะถูกเปิดเผย</div>'+renderCardGrid(p.hand,'atkPickCard'),[]);
}
function atkPickCard(cid){
  const pi=G.turn;
  const card=G.players[pi].hand.find(c=>c.id===cid);if(!card)return;
  closeModal();
  const nb=getNeighbors(pi);
  showModal('เลือกเป้าหมาย',
    `<div style="margin-bottom:8px;">โจมตีด้วย <span style="font-size:20px;">${SYM_EMOJI[card.sym]}</span> · หลบต้องมี ${SYM_EMOJI[DODGE_SYM[card.sym]]}</div>`+
    nb.map(ni=>`<button class="btn" onclick="doAttack(${pi},${ni},${cid})">${G.players[ni].char.emoji} ${G.players[ni].name} HP:${G.players[ni].hp}</button>`).join(''),
    [{label:'ยกเลิก',fn:closeModal}]);
}
function doAttack(atkI,defI,cid){
  closeModal();
  const atk=G.players[atkI],def=G.players[defI];
  const card=atk.hand.find(c=>c.id===cid);if(!card)return;
  atk.hand=atk.hand.filter(c=>c.id!==cid);G.discard.push(card);
  if(!atk.isBot){G.ap--;G.attackUsed=true;}
  showAtkBanner(atk,def,card);
  setTimeout(()=>{
    if(def.isBot)botDefend(atkI,defI,card);
    else playerDefend(atkI,defI,card);
  },1600);
}
function showAtkBanner(atk,def,card){
  const b=document.getElementById('banner-atk');
  b.innerHTML=`${atk.char.emoji} <b>${atk.name}</b> ⚔️ ${SYM_EMOJI[card.sym]} <b>${card.name}</b><br><span style="font-size:12px;color:var(--dim);">→ ${def.char.emoji} ${def.name}</span>`;
  b.classList.add('show');
  // Show card in center for 2 seconds
  const cl=document.getElementById('center-lbl');
  if(cl){
    cl._orig=cl._orig||cl.innerHTML;
    cl.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <div style="font-size:10px;color:var(--gold);">${atk.name} เล่น:</div>
      ${renderCardEl(card,false)}
    </div>`;
    setTimeout(()=>{cl.innerHTML=cl._orig||'⚔ กองกลาง';},2000);
  }
  setTimeout(()=>b.classList.remove('show'),3000);
}

/* ─ PLAYER DEFEND ─ */
function playerDefend(atkI,defI,atkCard){
  const atk=G.players[atkI],def=G.players[defI];
  const dodgeSym=DODGE_SYM[atkCard.sym];
  const hasDodge=def.hand.some(c=>c.sym===dodgeSym);
  const hasCounter=def.hand.some(c=>c.effect==='counter');
  const hasCancel=def.hand.some(c=>c.effect==='cancel');
  const dmg=Math.max(1,atk.atk-(atk.ignoreArmor?0:def.def));

  function after(){
    if(G.gameOver)return;
    renderAll();
    if(!G.players[atkI].isBot){setPhase('action');renderAll();}
    else endPhase(atkI);
  }

  // check armor first
  if(def.equip.armor){
    const ar=checkArmor(defI,atkCard);
    if(ar==='block'){addLog(`${def.name}: เกราะบล็อก!`);renderAll();after();return;}
    if(ar==='reflect'){atk.hp=Math.max(0,atk.hp-atk.atk);addLog(`เกราะสะท้อน! ${atk.name} HP-${atk.atk}`,'dmg');checkDeath(atkI);renderAll();after();return;}
  }

  // Online mode: if defender is a human player on another device, they handle it themselves
  // Host pushes state; defender's screen will show modal via their own renderAll
  if(OL.roomId && OL.isHost && !def.isBot){
    // Push state with a defend_request flag so defender's client shows modal
    G._defendRequest = { atkI, defI, atkCardId: atkCard.id };
    olPushState();
    // Also show modal on host if host IS the defender
    if(defI === OL.myPlayerIdx) _showDefendModal(atkI,defI,atkCard,after);
    return;
  }
  // Non-host defender sees modal from _defendRequest in their renderAll
  _showDefendModal(atkI,defI,atkCard,after);
}

function _showDefendModal(atkI,defI,atkCard,after){
  const atk=G.players[atkI],def=G.players[defI];
  const dodgeSym=DODGE_SYM[atkCard.sym];
  const hasDodge=def.hand.some(c=>c.sym===dodgeSym);
  const hasCounter=def.hand.some(c=>c.effect==='counter');
  const hasCancel=def.hand.some(c=>c.effect==='cancel');
  const dmg=Math.max(1,atk.atk-(atk.ignoreArmor?0:def.def));
  const opts=[];
  if(hasDodge)opts.push({label:`🛡 หลบ (ทิ้ง ${SYM_EMOJI[dodgeSym]})`,fn:()=>{
    closeModal();const dc=def.hand.find(c=>c.sym===dodgeSym);
    def.hand=def.hand.filter(c=>c.id!==dc.id);G.discard.push(dc);
    addLog(`${def.name}: หลบ! (ทิ้ง ${SYM_EMOJI[dc.sym]})`);
    G._defendRequest=null; if(after)after();}});
  if(hasCounter)opts.push({label:'↩ สวนกลับ',fn:()=>{
    closeModal();const cc=def.hand.find(c=>c.effect==='counter');
    def.hand=def.hand.filter(c=>c.id!==cc.id);G.discard.push(cc);
    atk.hp=Math.max(0,atk.hp-1);addLog(`${def.name}: สวนกลับ! ${atk.name} HP-1`,'dmg');
    showCardOverlay(def.name,cc,null);checkDeath(atkI);
    G._defendRequest=null; if(after)after();}});
  opts.push({label:`💥 รับ (-${dmg} HP)`,fn:()=>{
    closeModal();applyHit(atkI,defI,atkCard);
    G._defendRequest=null; if(after)after();}});
  if(hasCancel)opts.push({label:'✖ ยกเลิก',fn:()=>{
    closeModal();const cc=def.hand.find(c=>c.effect==='cancel');
    def.hand=def.hand.filter(c=>c.id!==cc.id);G.discard.push(cc);
    addLog(`${def.name}: ยกเลิกการโจมตี!`,'imp');
    G._defendRequest=null; if(after)after();}});
  showModal(`${atk.char.emoji} ${atk.name} โจมตีด้วย ${SYM_EMOJI[atkCard.sym]}`,
    `<div style="font-size:12px;margin-bottom:8px;">ATK ${atk.atk} − DEF ${def.def} = <b style="color:var(--red);">${dmg} HP</b><br><span style="color:var(--dim);font-size:10px;">หลบต้องมีการ์ด ${SYM_EMOJI[dodgeSym]}</span></div>`,opts);
}
function botDefend(atkI,defI,atkCard){
  const atk=G.players[atkI],def=G.players[defI];
  function after(){
    if(G.gameOver)return;
    renderAll();
    if(!G.players[atkI].isBot){setPhase('action');renderAll();}
    else endPhase(atkI);
  }
  const counter=def.hand.find(c=>c.effect==='counter');
  if(counter&&Math.random()<0.45){
    def.hand=def.hand.filter(c=>c.id!==counter.id);G.discard.push(counter);
    atk.hp=Math.max(0,atk.hp-1);addLog(`${def.name}: สวนกลับ! ${atk.name} HP-1`,'dmg');
    showCardOverlay(def.name,counter,null);checkDeath(atkI);after();return;
  }
  if(def.equip.armor){
    const ar=checkArmor(defI,atkCard);
    if(ar==='block'){addLog(`${def.name}: เกราะบล็อก!`);after();return;}
    if(ar==='reflect'){atk.hp=Math.max(0,atk.hp-atk.atk);addLog(`${def.name}: เกราะสะท้อน! ${atk.name} HP-${atk.atk}`,'dmg');checkDeath(atkI);after();return;}
  }
  const dodgeSym=DODGE_SYM[atkCard.sym];
  const dc=def.hand.find(c=>c.sym===dodgeSym);
  if(dc&&Math.random()<0.6){
    def.hand=def.hand.filter(c=>c.id!==dc.id);G.discard.push(dc);
    addLog(`${def.name}: หลบ! (ทิ้ง ${SYM_EMOJI[dc.sym]})`);after();return;
  }
  applyHit(atkI,defI,atkCard);after();
}

function applyHit(atkI,defI,atkCard){
  const atk=G.players[atkI],def=G.players[defI];
  let dmg=atk.atk;if(!atk.ignoreArmor)dmg=Math.max(1,dmg-def.def);
  def.hp=Math.max(0,def.hp-dmg);
  addLog(`${def.name}: -${dmg} HP (เหลือ ${def.hp})`,'dmg');
  if(atk.drawAfterAtk)drawCards(atkI,1);
  checkDeath(defI);
}
function checkArmor(pi,atkCard){
  const p=G.players[pi];if(!p.equip.armor)return'none';
  if(!G.deck.length)G.deck=shuffle(G.discard.splice(0));
  const top=G.deck.pop();if(!top)return'none';
  G.discard.push(top);addLog(`${p.name}: เกราะเปิด ${SYM_EMOJI[top.sym]}`);
  const a=p.equip.armor;
  if(a.armorType==='cape'&&top.sym==='paper')return'reflect';
  if(a.armorType==='jacket'&&top.sym==='scissors')return'block';
  return'none';
}

/* ═══ BOT AI ═══ */
function botTurn(pi){
  if(G.gameOver)return;
  const p=G.players[pi];
  const eqs=p.hand.filter(c=>c.type==='equipment');
  if(eqs.length)doInstall(pi,eqs[~~(Math.random()*eqs.length)]);
  const acts=p.hand.filter(c=>c.type==='action'&&G.ap>=c.ap&&c.effect!=='counter'&&c.effect!=='cancel');
  if(acts.length&&G.ap>0){
    const card=acts[~~(Math.random()*acts.length)];
    p.hand=p.hand.filter(c=>c.id!==card.id);G.discard.push(card);
    G.ap=Math.max(0,G.ap-card.ap);
    addLog(`${p.name} เล่น: ${card.name}`);
    showCardOverlay(p.name,card,null);
    const alive=G.players.filter(q=>!q.dead&&q.i!==pi);
    const needsTarget=['heal1','destroy','steal','skipturn','duel'].includes(card.effect);
    const tPi=needsTarget&&alive.length?alive[~~(Math.random()*alive.length)].i:null;
    setTimeout(()=>{applyCardEffect(pi,card,tPi);},500);
  }
  const nb=getNeighbors(pi);
  if(nb.length&&G.ap>=1&&(!G.attackUsed||p.multiAtk)&&p.hand.length){
    const tgt=nb.map(ni=>G.players[ni]).filter(q=>!q.dead).sort((a,b)=>a.hp-b.hp)[0];
    if(tgt){
      const card=p.hand[~~(Math.random()*p.hand.length)];
      G.ap--;G.attackUsed=true;
      p.hand=p.hand.filter(c=>c.id!==card.id);G.discard.push(card);
      addLog(`${p.name} โจมตี ${tgt.name} ด้วย ${SYM_EMOJI[card.sym]}`);
      showAtkBanner(p,tgt,card);
      setTimeout(()=>{
        if(tgt.isBot)botDefend(pi,tgt.i,card);
        else playerDefend(pi,tgt.i,card);
      },1800);
      return;
    }
  }
  setTimeout(()=>endPhase(pi),600);
}

/* ═══ CARD EFFECTS ═══ */
function applyCardEffect(pi,card,tPi){
  const p=G.players[pi];
  switch(card.effect){
    case'draw2':drawCards(pi,2);break;
    case'heal1':{const t=tPi!==null?G.players[tPi]:p;t.hp=Math.min(t.maxHp,t.hp+1);addLog(`${t.name} HP+1`,'hl');break;}
    case'healstrong':{p.hp=Math.min(p.maxHp,p.hp+1);if(Math.random()<0.5){p.hp=Math.min(p.maxHp,p.hp+1);addLog(`${p.name} ฮีลแรง! HP+2`,'hl');}else addLog(`${p.name} HP+1`,'hl');break;}
    case'mp_black1':p.mpB=Math.min(3,p.mpB+1);addLog(`${p.name}: +1 MPดำ`);break;
    case'mp_white1':p.mpW=Math.min(3,p.mpW+1);addLog(`${p.name}: +1 MPขาว`);break;
    case'mp_black2':p.mpB=Math.min(3,p.mpB+2);addLog(`${p.name}: +2 MPดำ`);break;
    case'mp_white2':p.mpW=Math.min(3,p.mpW+2);addLog(`${p.name}: +2 MPขาว`);break;
    case'ap_plus1':G.ap++;addLog(`${p.name}: +1 AP!`,'imp');break;
    case'skipturn':if(tPi!==null){G.skipCurse[tPi]=true;addLog(`${G.players[tPi].name}: ถูกคำสาปข้ามเทิร์น!`);}break;
    case'curse':G.curseCard[pi]=card;addLog(`${p.name}: วางการ์ดคำสาป`);break;
    case'destroy':{if(tPi!==null){const t=G.players[tPi];const sl=Object.keys(t.equip);if(sl.length){const s=sl[~~(Math.random()*sl.length)];G.discard.push(t.equip[s]);delete t.equip[s];recalcStats(tPi);addLog(`${p.name}: ทำลาย ${s} ของ ${t.name}`,'dmg');}else addLog(`${G.players[tPi].name} ไม่มีอุปกรณ์`);}break;}
    case'steal':{if(tPi!==null){const t=G.players[tPi];const sl=Object.keys(t.equip);if(sl.length){const s=sl[~~(Math.random()*sl.length)];const eq=t.equip[s];delete t.equip[s];recalcStats(tPi);doInstall(pi,eq);addLog(`${p.name}: ขโมย ${eq.name} จาก ${t.name}!`);}else addLog(`${G.players[tPi].name} ไม่มีอุปกรณ์`);}break;}
    case'aoe_hammer':doAOE(pi,'hammer');break;
    case'aoe_scissors':doAOE(pi,'scissors');break;
    case'aoe_paper':doAOE(pi,'paper');break;
    case'duel':if(tPi!==null)doDuel(pi,tPi);break;
    case'share':doShare(pi);break;
    case'counter':addLog('สวนกลับ: ใช้ตอนถูกโจมตี');break;
    case'cancel':addLog('ยกเลิก: ใช้ตอนถูกโจมตี');break;
    case'equip':doInstall(pi,card);return;
  }
  renderAll();
}

function doAOE(pi,sym){
  for(const q of G.players){
    if(q.dead||q.i===pi)continue;
    const c=q.hand.find(x=>x.sym===sym);
    if(c){q.hand=q.hand.filter(x=>x.id!==c.id);G.discard.push(c);addLog(`${q.name}: ทิ้ง ${SYM_EMOJI[sym]} ปลอดภัย`);}
    else{q.hp=Math.max(0,q.hp-1);addLog(`${q.name}: ไม่มี ${SYM_EMOJI[sym]} HP-1`,'dmg');checkDeath(q.i);}
  }
}
function doDuel(pi,ti){
  const p=G.players[pi],t=G.players[ti];
  if(!p.hand.length||!t.hand.length){addLog('ดวลไม่ได้ (มือว่าง)');return;}
  const pc=p.hand[~~(Math.random()*p.hand.length)];
  const tc=t.hand[~~(Math.random()*t.hand.length)];
  addLog(`ดวล: ${p.name}[${SYM_EMOJI[pc.sym]}] vs ${t.name}[${SYM_EMOJI[tc.sym]}]`);
  function beats(a,b){return(a==='hammer'&&b==='scissors')||(a==='scissors'&&b==='paper')||(a==='paper'&&b==='hammer');}
  if(pc.sym===tc.sym){p.hp=Math.max(0,p.hp-1);t.hp=Math.max(0,t.hp-1);addLog('เสมอ! ทั้งคู่ HP-1','dmg');}
  else if(beats(pc.sym,tc.sym)){t.hp=Math.max(0,t.hp-1);addLog(`${t.name} HP-1`,'dmg');}
  else{p.hp=Math.max(0,p.hp-1);addLog(`${p.name} HP-1`,'dmg');}
  checkDeath(pi);checkDeath(ti);
}
function doShare(pi){
  const drawn=[];
  for(let i=0;i<5;i++){
    if(!G.deck.length){if(G.discard.length)G.deck=shuffle(G.discard.splice(0));else break;}
    const c=G.deck.pop();if(c)drawn.push(c);
  }
  addLog(`แบ่งปัน: จั่ว ${drawn.length} ใบ`);
  const alive=G.players.filter(p=>!p.dead).sort((a,b)=>a.i===pi?-1:b.i===pi?1:0);
  for(const p of alive){
    if(!drawn.length)break;
    const c=drawn.splice(~~(Math.random()*drawn.length),1)[0];
    p.hand.push(c);addLog(`${p.name}: รับ ${c.name}`);
  }
  for(const c of drawn)G.discard.push(c);
}
function doInstall(pi,card){
  const p=G.players[pi];const slot=card.slot;if(!slot)return;
  if(p.equip[slot]){G.discard.push(p.equip[slot]);addLog(`${p.name}: เปลี่ยน ${p.equip[slot].name}→${card.name}`);}
  p.equip[slot]=card;p.hand=p.hand.filter(c=>c.id!==card.id);
  recalcStats(pi);addLog(`${p.name}: ติดตั้ง ${card.name}`);
  if(p.char.onEquip)p.char.onEquip(pi);renderAll();
}

/* ═══ PLUTO HELPER ═══ */
function plutoNextVictim(){
  if(!G._plutoVictims||!G._plutoVictims.length){renderAll();return;}
  const vi=G._plutoVictims.shift();
  const v=G.players[vi];
  if(!v||v.dead||!v.hand.length){plutoNextVictim();return;}
  showModal(`Pluto Skill: ${v.name} เลือกการ์ดทิ้ง`,
    '<div style="margin-bottom:6px;font-size:11px;color:var(--dim);">เลือก 1 ใบที่จะทิ้ง</div>'+renderCardGrid(v.hand,'plutoToss'),[]);
}
function plutoToss(cid){
  closeModal();
  // find which victim's hand has this card
  const v=G.players.find(p=>p.hand.some(c=>c.id===cid));
  if(!v)return;
  const c=v.hand.find(x=>x.id===cid);
  v.hand=v.hand.filter(x=>x.id!==cid);G.discard.push(c);
  addLog(`${v.name}: ทิ้ง ${c.name} (Pluto)`);
  plutoNextVictim();
}

/* ═══ PLAYER ACTIONS ═══ */
function drawAction(){
  if(!isMyTurnToAct())return;
  if(G.ap<1){addLog('AP ไม่พอ');return;}
  G.ap--;drawCards(G.turn,1);renderAll();
}
function playSelected(){
  if(!isMyTurnToAct())return;
  const card=G.selectedCard;if(!card){addLog('เลือกการ์ดก่อน');return;}
  if(card.type==='equipment'){installSelected();return;}
  if(G.ap<card.ap){addLog(`AP ไม่พอ (ต้องการ ${card.ap})`);return;}
  if(card.effect==='counter'){addLog('สวนกลับ: เก็บไว้ใช้ตอนถูกโจมตี');return;}
  if(card.effect==='cancel'){addLog('ยกเลิก: เก็บไว้ใช้ตอนถูกโจมตี');return;}
  const pi=G.turn;
  const needTarget=['heal1','destroy','steal','skipturn','duel'].includes(card.effect);
  if(needTarget){
    const ts=G.players.filter(q=>!q.dead&&q.i!==pi);
    if(!ts.length){addLog('ไม่มีเป้าหมาย');return;}
    showModal(`เลือกเป้าหมาย: ${card.name}`,
      ts.map(t=>`<button class="btn" onclick="confirmPlay(${card.id},${t.i})">${t.char.emoji} ${t.name} HP:${t.hp}</button>`).join(''),
      [{label:'ยกเลิก',fn:closeModal}]);return;
  }
  commitPlay(card,null);
}
function confirmPlay(cid,ti){
  closeModal();const pi=G.turn;
  const card=G.players[pi].hand.find(c=>c.id===cid);if(!card)return;
  if(G.ap<card.ap){addLog('AP ไม่พอ');return;}
  commitPlay(card,ti);
}
function commitPlay(card,ti){
  const pi=G.turn;const p=G.players[pi];
  G.ap=Math.max(0,G.ap-card.ap);
  p.hand=p.hand.filter(c=>c.id!==card.id);G.discard.push(card);
  G.selectedCard=null;
  showCardOverlay(p.name,card,()=>{applyCardEffect(pi,card,ti);renderAll();});
}
function installSelected(){
  if(!isMyTurnToAct())return;
  const card=G.selectedCard;
  if(!card||card.type!=='equipment'){addLog('เลือกการ์ดอุปกรณ์ก่อน');return;}
  const pi=G.turn;const p=G.players[pi];
  showCardOverlay(p.name,card,()=>{doInstall(pi,card);G.selectedCard=null;});
}
function useCharSkill(){
  if(!isMyTurnToAct())return;
  const ch=G.players[G.turn].char;
  if(!ch.hasSkill){addLog(`${ch.name}: Passive Skill ใช้อัตโนมัติ`);return;}
  ch.onSkill(G.turn);renderAll();
}
function useItemSkill(){
  if(!isMyTurnToAct())return;
  const p=G.players[G.turn];
  const items=Object.values(p.equip).filter(e=>e.skill);
  if(!items.length){addLog('ไม่มี Item Skill');return;}
  const opts=items.map(eq=>({label:`${eq.name}: ${eq.desc}`,fn:()=>{closeModal();activateItemSkill(G.turn,eq);}}));
  opts.push({label:'ยกเลิก',fn:closeModal});
  showModal('Item Skill','',opts);
}
function activateItemSkill(pi,eq){
  const p=G.players[pi];
  if(eq.skill==='necklace'){if(p.hp<=1){addLog('HP ไม่พอ');return;}p.hp--;drawCards(pi,2);addLog(`สร้อยคอ: HP-1→จั่ว2`);}
  else if(eq.skill==='bag'){if(!spendMP(p,1)){addLog('MP ไม่พอ');return;}drawCards(pi,1);addLog(`กระเป๋า: -1MP→จั่ว1`);}
  else if(eq.skill==='watch'){if(!spendMP(p,2)){addLog('MP ไม่พอ (ต้องการ2)');return;}drawCards(pi,3);addLog(`นาฬิกา: -2MP→จั่ว3`);}
  else if(eq.skill==='dog'){if(p.mpB<3){addLog('MPดำ ไม่พอ (3)');return;}pickTarget(pi,'หมาน้อย: เป้าหมาย',t=>{p.mpB-=3;t.hp=Math.max(0,t.hp-1);addLog(`หมาน้อย! ${t.name} HP-1`,'dmg');checkDeath(t.i);renderAll();});return;}
  else if(eq.skill==='cat'){if(p.mpW<2){addLog('MPขาว ไม่พอ (2)');return;}pickTarget(pi,'แมวน้อย: เป้าหมาย',t=>{p.mpW-=2;t.hp=Math.min(t.maxHp,t.hp+1);addLog(`แมวน้อย! ${t.name} HP+1`,'hl');renderAll();});return;}
  renderAll();
}
function hermesDestroy(ti){closeModal();const t=G.players[ti];const sl=Object.keys(t.equip);if(!sl.length){addLog('ไม่มีอุปกรณ์');return;}const s=sl[~~(Math.random()*sl.length)];G.discard.push(t.equip[s]);delete t.equip[s];recalcStats(ti);addLog(`🪶 Hermes: ทำลาย ${s} ของ ${t.name}`,'dmg');renderAll();}
function aphToggle(ti){if(!G._aphSel)G._aphSel=[];const b=document.getElementById('aph'+ti);if(G._aphSel.includes(ti)){G._aphSel=G._aphSel.filter(x=>x!==ti);if(b)b.style.borderColor='var(--border)';}else if(G._aphSel.length<2){G._aphSel.push(ti);if(b)b.style.borderColor='var(--gold)';}}
function aphConfirm(){if(!G._aphSel||G._aphSel.length!==2){addLog('เลือก 2 คน');return;}closeModal();doDuel(G._aphSel[0],G._aphSel[1]);G._aphSel=[];renderAll();}
function endTurn(){
  if(!isMyTurnToAct())return;
  G.selectedCard=null;endPhase(G.turn);
}

/* ═══ RENDER ═══ */
function renderAll(){
  if(!G.players)return;
  renderBoard();renderHand();renderActionPanel();
  const cp=G.players[G.turn];
  document.getElementById('turn-info').textContent=cp?`เทิร์น: ${cp.char.emoji} ${cp.name}`:'';
  document.getElementById('deck-count').textContent=`กอง: ${G.deck.length} | ทิ้ง: ${G.discard.length}`;
}
function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML=buildBoardHtml();
  board.querySelectorAll('.equip-badge').forEach(el=>{
    el.addEventListener('mouseenter',e=>showTip(e,el.dataset.desc));
    el.addEventListener('mouseleave',hideTip);
  });
}
function getActivePi(){
  // Online mode: show yourself at bottom
  if(OL.roomId){
    const myIdx = OL.myPlayerIdx ?? OL.mySlot ?? 0;
    if(myIdx >= 0 && myIdx < G.players.length && !G.players[myIdx].dead) return myIdx;
  }
  if(G.humanCount===1)return 0;
  if(!G.players[G.turn].isBot)return G.turn;
  const humans=G.players.filter(p=>!p.isBot&&!p.dead);
  return humans.length?humans[0].i:0;
}
function buildBoardHtml(){
  const activePi=getActivePi();
  const topPis=G.players.map(p=>p.i).filter(i=>i!==activePi);
  let html='<div class="player-row">';
  for(const i of topPis)html+=renderSeat(i);
  html+='</div>';
  html+=`<div class="player-row" style="justify-content:center;">
    <div id="deck-pile"><span>🂠</span><small>${G.deck.length}ใบ</small></div>
    <div id="center-lbl">⚔ กองกลาง</div>
    <div id="disc-pile"><small>ทิ้ง</small><small>${G.discard.length}</small></div>
  </div>`;
  html+='<div class="player-row">'+renderSeat(activePi)+'</div>';
  return html;
}
function renderSeat(pi){
  const p=G.players[pi];
  const activePi=getActivePi();
  const isMe=pi===activePi&&!p.isBot;
  const active=G.turn===pi&&!G.gameOver;
  const hpPct=Math.max(0,Math.min(100,p.hp/p.maxHp*100));
  // role visibility: show if it's me (current active human), or LEADER, or dead (revealed)
  const roleVis=isMe||p.role==='LEADER'||p.dead;
  const roleBadge=roleVis?`<span class="role-badge role-${p.role}" title="${p.role}">${p.role}</span>`:`<span class="role-badge role-hidden">?</span>`;
  const playerTypeBadge=p.isBot?`<span class="bot-badge">BOT</span>`:`<span class="human-badge">👤</span>`;
  const eqHtml=Object.entries(p.equip||{}).map(([sl,e])=>e?`<span class="equip-badge" data-desc="${e.desc||e.name}">${e.name}</span>`:'').join('');
  const mpRow=`<div class="mp-row"><span class="mp-sep">W</span>${[0,1,2].map(i=>`<div class="mp-dot ${i<p.mpW?'wf':'em'}"></div>`).join('')}<span class="mp-sep">B</span>${[0,1,2].map(i=>`<div class="mp-dot ${i<p.mpB?'bf':'em'}"></div>`).join('')}</div>`;
  const curseL=G.curseCard[pi]?`<div class="tag-sm curse-tag">☠ คำสาปรอ</div>`:'';
  const skipL=G.skipCurse[pi]?`<div class="tag-sm curse-tag">⏭ จะข้ามเทิร์น</div>`:'';
  let myStatusHtml='';
  if(isMe){
    myStatusHtml=`<div class="my-status">
      <div class="my-status-title">สถานะ — ${p.char.emoji} ${p.char.name}</div>
      <div class="my-stat-grid">
        <div class="my-stat-box"><div class="msl">❤️ HP</div><div class="msv msv-hp">${p.hp}/${p.maxHp}</div></div>
        <div class="my-stat-box"><div class="msl">⚔ ATK</div><div class="msv msv-atk">${p.atk}</div></div>
        <div class="my-stat-box"><div class="msl">🛡 DEF</div><div class="msv msv-def">${p.def}</div></div>
        <div class="my-stat-box"><div class="msl">📏 ระยะ</div><div class="msv msv-range">${p.range}</div></div>
        <div class="my-stat-box"><div class="msl">⚡ AP</div><div class="msv msv-ap">${active?G.ap:3}/3</div></div>
        <div class="my-stat-box"><div class="msl">⬜MP</div><div class="msv msv-mp">${p.mpW}/3</div></div>
        <div class="my-stat-box"><div class="msl">⬛MP</div><div class="msv msv-mp">${p.mpB}/3</div></div>
        <div class="my-stat-box"><div class="msl">🂠มือ</div><div class="msv msv-hand">${p.hand.length}</div></div>
      </div>
      <div class="my-char-info"><div class="my-passive">Passive: ${p.char.passive}</div><div class="my-skill-desc">Skill: ${p.char.skillDesc}</div></div>
    </div>`;
  }
  return`<div class="player-seat ${active?'active-turn':''} ${p.dead?'dead':''} ${isMe?'my-seat':''}">
    <div class="seat-top">
      <div class="seat-av" style="background:${p.char.color}22;border-color:${p.char.color}66;overflow:hidden;padding:0;">${charSVG(p.char.id,24)}</div>
      <span class="seat-name">${p.name}·${p.char.name}</span>
      ${roleBadge}${playerTypeBadge}
    </div>
    <div class="hp-bar-wrap"><div class="hp-bar" style="width:${hpPct}%"></div></div>
    ${!isMe?`<div class="stats-g"><div class="s-box"><div class="sl">HP</div><div class="sv">${p.hp}/${p.maxHp}</div></div><div class="s-box"><div class="sl">ATK</div><div class="sv">${p.atk}</div></div><div class="s-box"><div class="sl">DEF</div><div class="sv">${p.def}</div></div><div class="s-box"><div class="sl">ระยะ</div><div class="sv">${p.range}</div></div></div>`:''}
    ${mpRow}
    <div class="equip-row">${eqHtml||'<span style="font-size:9px;color:var(--dim);">ไม่มีอุปกรณ์</span>'}</div>
    ${curseL}${skipL}
    ${!isMe?`<div class="tag-sm card-ct">มือ: ${p.hand.length} ใบ</div>`:''}
    ${myStatusHtml}
  </div>`;
}
function renderHand(){
  if(!G.players)return;
  const el=document.getElementById('hand');if(!el)return;

  // Online mode: always show MY cards regardless of whose turn it is
  if(OL.roomId){
    const myIdx = OL.myPlayerIdx ?? 0;
    const me = G.players[myIdx];
    if(!me){el.innerHTML='';return;}
    const isMyTurn = G.turn===myIdx && G.phase==='action' && !me.isBot;
    document.getElementById('hand-lbl').textContent = isMyTurn
      ? `${me.name} — มือของคุณ (แตะเพื่อเลือก)`
      : `มือของคุณ (${me.hand?.length||0} ใบ) — ${isMyTurn?'':'รอเทิร์น'}`;
    el.innerHTML=(me.hand||[]).map(c=>renderCardEl(c,isMyTurn)).join('');
    if(isMyTurn){
      el.querySelectorAll('.card').forEach(el=>{
        const cid=+el.dataset.id;
        el.addEventListener('click',()=>selCard(cid));
        el.addEventListener('mouseenter',e=>showCardTip(e,cid));
        el.addEventListener('mouseleave',hideTip);
      });
    }
    return;
  }

  // Local mode (original logic)
  const activePi=getActivePi();
  const p=G.players[activePi];
  const isHumanTurn=!p.isBot&&G.turn===activePi&&G.phase==='action';
  document.getElementById('hand-lbl').textContent=isHumanTurn?`${p.name} — มือของคุณ (แตะเพื่อเลือก)`:`${G.players[G.turn].name} กำลังเล่น...`;
  if(!isHumanTurn){el.innerHTML='<div style="font-size:11px;color:var(--dim);padding:4px;">รอเทิร์นของคุณ...</div>';return;}
  el.innerHTML=p.hand.map(c=>renderCardEl(c)).join('');
  el.querySelectorAll('.card').forEach(el=>{
    const cid=+el.dataset.id;
    el.addEventListener('click',()=>selCard(cid));
    el.addEventListener('mouseenter',e=>showCardTip(e,cid));
    el.addEventListener('mouseleave',hideTip);
  });
}

function renderActionPanel(){
  const myTurn=isMyTurnToAct();
  const activePi=getActivePi();
  const p=G.players[activePi];const ap=myTurn?G.ap:0;
  const apEl=document.getElementById('ap-disp');
  if(apEl){apEl.innerHTML=[0,1,2].map(i=>`<div class="ap-pip ${i>=ap?'used':''}"></div>`).join('')+`<span style="font-size:10px;color:var(--dim);margin-left:4px;">${ap}/3 AP</span>`;}
  const sel=G.selectedCard;
  setBtn('btn-atk',myTurn&&ap>=1&&(!G.attackUsed||p.multiAtk));
  setBtn('btn-draw',myTurn&&ap>=1);
  setBtn('btn-play',myTurn&&!!sel&&sel.type!=='equipment'&&sel.effect!=='counter'&&sel.effect!=='cancel'&&ap>=(sel?.ap||0));
  setBtn('btn-inst',myTurn&&!!sel&&sel.type==='equipment');
  setBtn('btn-cskill',myTurn&&p.char.hasSkill);
  setBtn('btn-iskill',myTurn&&Object.values(p.equip).some(e=>e.skill));
  setBtn('btn-end',myTurn);
}
function setBtn(id,en){const el=document.getElementById(id);if(el)el.disabled=!en;}
function selCard(cid){
  if(!isMyTurnToAct())return;
  const activePi=getActivePi();
  const card=G.players[activePi].hand.find(c=>c.id===cid);if(!card)return;
  G.selectedCard=(G.selectedCard?.id===cid)?null:card;
  renderHand();renderActionPanel();
}

// ── state ──
let OL = {
  roomId: null,      // 6-char code
  myUid: null,       // random uid
  mySlot: null,      // 0-4
  isHost: false,
  unsubRoom: null,   // firebase listener unsub
  charPicked: null,
  playerName: ''
};

// Tiny uid generator
function genUid(){ return Math.random().toString(36).slice(2,10); }
function genRoomId(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }

// ── helpers ──
function fb(){ return window._fb; }
function roomRef(roomId){ return fb().ref(fb().db, `rooms/${roomId}`); }

function olStatus(msg, col='var(--dim)'){
  const el=document.getElementById('lobby-status');
  if(el){el.textContent=msg;el.style.color=col;}
}

// ── open / close lobby ──
function openOnlineLobby(){
  OL.myUid = genUid();
  document.getElementById('online-lobby').classList.add('show');
}

function olLeave(){
  // clean up firebase listener & optionally remove slot
  if(OL.unsubRoom){ OL.unsubRoom(); OL.unsubRoom=null; }
  if(OL.roomId && OL.mySlot !== null){
    const { db, ref, update } = fb();
    const patch = {};
    patch[`slots/${OL.mySlot}`] = null;
    update(ref(db, `rooms/${OL.roomId}`), patch).catch(()=>{});
  }
  OL = { roomId:null, myUid:null, mySlot:null, isHost:false, unsubRoom:null, charPicked:null, playerName:'' };
  document.getElementById('online-lobby').classList.remove('show');
  document.getElementById('ol-join-wrap').style.display='none';
  document.getElementById('lobby-room-id').style.display='none';
  document.getElementById('ol-char-pick').style.display='none';
  document.getElementById('ol-start-btn').style.display='none';
  document.getElementById('lobby-players').innerHTML='';
  olStatus('');
}

  const w=document.getElementById('ol-join-wrap');
  w.style.display = w.style.display==='none' ? 'flex':'none';
}

function olCopyCode(){
  const code = document.getElementById('ol-rid-text').textContent;
  navigator.clipboard.writeText(code).then(()=>olStatus('คัดลอกรหัสแล้ว! ส่งให้เพื่อนได้เลย ✅','var(--green)'));

// ── create room ──
async function olCreateRoom(){
  if(!window._fbReady){ olStatus('กำลังเชื่อม Firebase...'); return; }
  const name = document.getElementById('ol-name').value.trim() || 'Host';
  OL.playerName = name;
  OL.isHost = true;
  OL.mySlot = 0;
  const rid = genRoomId();
  OL.roomId = rid;

  const { db, ref, set, serverTimestamp } = fb();
  const roomData = {
    host: OL.myUid,
    status: 'lobby',   // 'lobby' | 'picking' | 'playing'
    created: Date.now(),
    slots: {
      0: { uid: OL.myUid, name, char: null, ready: false }
    }
  };

  olStatus('กำลังสร้างห้อง...');
  try {
    await set(ref(db, `rooms/${rid}`), roomData);
    document.getElementById('ol-rid-text').textContent = rid;
    document.getElementById('lobby-room-id').style.display='block';
    document.getElementById('ol-start-btn').style.display='block';
    olStatus(`ห้องพร้อม! รอเพื่อน...`, 'var(--green)');
    olSubscribeRoom(rid);
  } catch(e){
    olStatus('สร้างห้องไม่ได้: '+e.message, 'var(--red)');
  }
}

// ── join room ──
async function olJoinRoom(){
  if(!window._fbReady){ olStatus('กำลังเชื่อม Firebase...'); return; }
  const code = document.getElementById('ol-room-code').value.trim().toUpperCase();
  if(code.length !== 6){ olStatus('รหัสต้อง 6 ตัวอักษร'); return; }
  const name = document.getElementById('ol-name').value.trim() || 'Player';
  OL.playerName = name;

  const { db, ref, get, update } = fb();
  olStatus('กำลังเชื่อมต่อห้อง...');
  try {
    const snap = await get(ref(db, `rooms/${code}`));
    if(!snap.exists()){ olStatus('ไม่พบห้อง: '+code, 'var(--red)'); return; }
    const room = snap.val();
    if(room.status === 'playing'){ olStatus('เกมนี้เริ่มแล้ว ไม่สามารถเข้าได้', 'var(--red)'); return; }
    const taken = Object.keys(room.slots||{}).map(Number);
    let freeSlot = -1;
    for(let i=0;i<5;i++){ if(!taken.includes(i)){ freeSlot=i; break; } }
    if(freeSlot===-1){ olStatus('ห้องเต็มแล้ว (5/5)', 'var(--red)'); return; }

    OL.roomId = code;
    OL.mySlot = freeSlot;
    OL.isHost = false;

    const patch = {};
    patch[`slots/${freeSlot}`] = { uid: OL.myUid, name, char: null, ready: false };
    await update(ref(db, `rooms/${code}`), patch);

    document.getElementById('ol-rid-text').textContent = code;
    document.getElementById('lobby-room-id').style.display='block';
    olStatus(`เข้าร่วมสำเร็จ! รอ Host เริ่มเกม...`, 'var(--green)');
    olSubscribeRoom(code);
  } catch(e){
    olStatus('ไม่สามารถเข้าร่วม: '+e.message, 'var(--red)');
  }
}

// ── subscribe to room changes ──
function olSubscribeRoom(rid){
  const { db, ref, onValue } = fb();
  const unsub = onValue(ref(db, `rooms/${rid}`), snap => {
    if(!snap.exists()){ olStatus('ห้องถูกปิด', 'var(--red)'); return; }
    const room = snap.val();
    if(room.status === 'lobby' || room.status === 'picking'){
      olRenderLobbyPlayers(room.slots||{});
    }
    if(room.status === 'picking') olEnterCharPick(room.slots||{});
    if(room.status === 'playing' && room.gameState && room.gameState.players && room.gameState.players.length > 0){
      unsub(); OL.unsubRoom = null;
      if(!OL.isHost) olStartOnlineGame(room.gameState, room.slots||{});
      olSubscribeGameState(rid);
    }
  });
  OL.unsubRoom = unsub;
}

function olRenderLobbyPlayers(slots){
  const el = document.getElementById('lobby-players');
  let html = '';
  for(let i=0;i<5;i++){
    const s = slots[i];
    if(s){
      html += `<div class="lobby-p-row"><div class="lobby-p-dot"></div>
        <span>${s.name}${i===OL.mySlot?' (คุณ)':''}</span>
        ${s.char?`<span style="margin-left:auto;font-size:10px;color:var(--gold);">${s.char}</span>`:''}
        ${s.ready?'<span style="color:var(--green);margin-left:4px;font-size:10px;">✓</span>':''}
      </div>`;
    } else {
      html += `<div class="lobby-p-row"><div class="lobby-p-dot empty"></div>
        <span style="color:var(--dim);">ว่าง (Bot จะเติม)</span></div>`;
    }
  }
  el.innerHTML = html;
}

function olEnterCharPick(slots){
  const pickWrap = document.getElementById('ol-char-pick');
  if(pickWrap.style.display !== 'none') return;
  pickWrap.style.display = 'block';
  olStatus('เลือกตัวละครของคุณ!', 'var(--gold)');
  const takenChars = Object.values(slots).filter(s=>s.char).map(s=>s.char);
  const grid = document.getElementById('ol-char-grid');
  grid.innerHTML = CHARACTERS.map(ch => {
    const taken = takenChars.includes(ch.id);
    return `<div class="char-card ${taken?'taken':''}" onclick="olPickChar('${ch.id}')" id="olcc-${ch.id}"
      style="${taken?'opacity:.4;pointer-events:none;':'cursor:pointer;'}">
      <div class="cav" style="background:${ch.color}22;border-color:${ch.color}66;padding:0;">${charSVG(ch.id,46)}</div>
      <div class="cname">${ch.name}</div>
    </div>`;
  }).join('');
}

async function olPickChar(charId){
  if(OL.charPicked === charId) return;
  OL.charPicked = charId;
  const { db, ref, update } = fb();
  const patch = {};
  patch[`slots/${OL.mySlot}/char`] = charId;
  patch[`slots/${OL.mySlot}/ready`] = true;
  try {
    await update(ref(db, `rooms/${OL.roomId}`), patch);
    document.querySelectorAll('#ol-char-grid .char-card').forEach(el=>el.classList.remove('selected'));
    document.getElementById('olcc-'+charId)?.classList.add('selected');
    olStatus('เลือก '+CHARACTERS.find(c=>c.id===charId)?.name+' แล้ว ✅', 'var(--green)');
  } catch(e){ olStatus('บันทึกไม่ได้: '+e.message, 'var(--red)'); }
}

async function olStartGame(){
  if(!OL.isHost){ olStatus('เฉพาะ Host เท่านั้น'); return; }
  const { db, ref, get, update } = fb();
  const snap = await get(ref(db, `rooms/${OL.roomId}`));
  const room = snap.val();
  const slots = room.slots || {};

  if(room.status === 'lobby'){
    await update(ref(db, `rooms/${OL.roomId}`), { status: 'picking' });
    olStatus('เลือกตัวละครก่อนเริ่มเกม', 'var(--gold)');
    document.getElementById('ol-start-btn').textContent = '▶ เริ่มเกมได้เลย';
    return;
  }

  const humanSlots = Object.values(slots);
  if(humanSlots.some(s => !s.char)){
    olStatus('รอให้ทุกคนเลือกตัวละครก่อน', 'var(--red)'); return;
  }

  olStatus('กำลังสร้างเกม...', 'var(--gold)');
  const gs = olBuildInitialGameState(slots);
  // Host starts immediately without waiting for Firebase round-trip
  olStartOnlineGame(gs, slots);
  // Push serialized state for others
  await update(ref(db, `rooms/${OL.roomId}`), { status: 'playing', gameState: olSerializeGs(G) });
}

function _sanitizeGs(g){
  for(const p of g.players){
    p.equip = p.equip || {};
    p.hand = p.hand || [];
    if(!p.char || typeof p.char !== 'object' || !p.char.id)
      p.char = CHARACTERS.find(c=>c.id===p.charId) || p.char;
  }
  g.log = g.log || [];
  g.discard = g.discard || [];
  g.deck = g.deck || [];
  g._aphSel = g._aphSel || [];
  g._deathQueue = g._deathQueue || [];
  g._plutoVictims = g._plutoVictims || [];
  g.skipCurse = g.skipCurse || Array(5).fill(false);
  g.curseCard = g.curseCard || Array(5).fill(null);
  return g;
}

function olHydrateAndRender(gs){
  if(OL.isHost) return;
  G = _sanitizeGs(gs);
  document.getElementById('title-screen').style.display='none';
  document.getElementById('online-lobby').classList.remove('show');
  renderAll();

  // Check if there's a defend request for ME
  if(G._defendRequest && G._defendRequest.defI === OL.myPlayerIdx){
    const {atkI, defI, atkCardId} = G._defendRequest;
    const atkCard = G.discard.find(c=>c.id===atkCardId) ||
                    G.players[atkI].hand.find(c=>c.id===atkCardId);
    if(atkCard){
      _showDefendModal(atkI, defI, atkCard, ()=>{
        // Non-host: push defend result back to Firebase
        olPushState();
      });
    }
  }
}

function olStartOnlineGame(gs, slots){
  document.getElementById('online-lobby').classList.remove('show');
  document.getElementById('title-screen').style.display='none';

  let myPlayerIdx = 0;
  if(gs.slotToPlayerIdx){
    const val = gs.slotToPlayerIdx[String(OL.mySlot)];
    myPlayerIdx = (val !== undefined && val !== null) ? Number(val) : 0;
  }
  OL.myPlayerIdx = myPlayerIdx;

  if(OL.isHost){
    // Host: set G directly and run the game
    // Sanitize first
    for(const p of gs.players){
      p.equip = p.equip || {};
      p.hand = p.hand || [];
      p.char = CHARACTERS.find(c=>c.id===p.charId) || p.char;
    }
    gs.log = gs.log || [];
    gs.discard = gs.discard || [];
    gs._aphSel = gs._aphSel || [];
    gs._deathQueue = gs._deathQueue || [];
    gs._plutoVictims = gs._plutoVictims || [];
    gs.skipCurse = gs.skipCurse || Array(5).fill(false);
    gs.curseCard = gs.curseCard || Array(5).fill(null);
    G = gs;
    G.humanCount = Object.keys(slots).length;
    document.getElementById('title-screen').style.display='none';
    // Push state every 500ms
    setInterval(()=>{
      if(OL.isHost && OL.roomId && G.players && G.players.length > 0) olPushState();
    }, 500);
    addLog('=== เกม Online เริ่ม! ===','imp');
    beginTurn(0);
  } else {
    // Non-host: receive state from Firebase
    olHydrateAndRender(gs);
    addLog('=== เกม Online เริ่ม! ===','imp');
  }
}

// ── push game state to Firebase (host only) ──
async function olPushState(){
  if(!OL.isHost || !OL.roomId) return;
  const { db, ref, update } = fb();
  // Serialize: replace char objects with charId strings for Firebase
  const gsToSave = olSerializeGs(G);
  try {
    await update(ref(db, `rooms/${OL.roomId}`), { gameState: gsToSave });
  } catch(e){ console.warn('olPushState error', e); }
}

function olSerializeGs(gs){
  // Deep clone-ish, replace char obj → charId string
  const s = JSON.parse(JSON.stringify(gs));
  for(const p of s.players){ p.charId = p.char?.id || p.charId; delete p.char; }
  return s;
}

// ── push game state to Firebase periodically when host (no renderAll override needed) ──
let _olPushTimer = null;
function olSchedulePush(){
  if(!OL.isHost || !OL.roomId) return;
  if(_olPushTimer) clearTimeout(_olPushTimer);
  _olPushTimer = setTimeout(()=>{ olPushState(); }, 300);
}

// ── subscribe to game state changes (non-host polling) ──
function olSubscribeGameState(rid){
  const { db, ref, onValue } = fb();
  const unsub = onValue(ref(db, `rooms/${rid}/gameState`), snap => {
    if(!snap.exists()) return;
    const gs = snap.val();
    if(!gs || !gs.players || !gs.players.length) return;
    if(!OL.isHost) olHydrateAndRender(gs);
  });
  OL.unsubGame = unsub;
}

// ── build initial serializable game state from lobby slots ──
function olBuildInitialGameState(slots){
  const roleList = shuffle([...ROLES]);
  const slotNums = Object.keys(slots).map(Number).sort((a,b)=>a-b);
  const humanCount = slotNums.length;
  const botCount = 5 - humanCount;

  const slotToPlayerIdx = {};
  slotNums.forEach((slot, i) => { slotToPlayerIdx[String(slot)] = i; });

  const humanChars = slotNums.map(s => CHARACTERS.find(c => c.id === slots[s].char));
  const usedIds = humanChars.map(c => c.id);
  const botChars = shuffle(CHARACTERS.filter(c => !usedIds.includes(c.id))).slice(0, botCount);
  const chars = [...humanChars, ...botChars];

  const humanNames = slotNums.map(s => slots[s].name);
  const botNames = ['Bot A','Bot B','Bot C','Bot D'].slice(0, botCount);
  const names = [...humanNames, ...botNames];

  const deck = makeDeck();
  const players = [];
  for(let i = 0; i < 5; i++){
    const role = roleList[i], ch = chars[i];
    const p = {
      i, name: names[i], isBot: i >= humanCount, role, charId: ch.id,
      hp: role==='LEADER'?8:7, maxHp: role==='LEADER'?8:7,
      atk:1, def:0, range:1, mpW:0, mpB:0,
      hand:[], equip:{}, dead:false,
      multiAtk:false, ignoreArmor:false, drawAfterAtk:false, _athBonus:0
    };
    if(ch.id==='arez') p.multiAtk=true;
    if(ch.id==='artemis') p.range+=3;
    players.push(p);
  }
  for(let r=0;r<5;r++) for(let i=0;i<5;i++){const c=deck.pop();if(c)players[i].hand.push(c);}

  return {
    deck, discard:[], players, turn:0, phase:'standby', ap:3,
    attackUsed:false, selectedCard:null, log:[], gameOver:false,
    skipCurse:Array(5).fill(false), curseCard:Array(5).fill(null),
    _aphSel:[], _deathQueue:[], _plutoVictims:[],
    humanCount, slotToPlayerIdx
  };
}
